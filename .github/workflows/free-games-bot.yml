name: Free Games Bot

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:        # Manual trigger for testing

jobs:
  invoke:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke free-games-bot edge function
        run: |
          curl -X POST \
            "https://wqgotyhepamnwsjcydpy.supabase.co/functions/v1/free-games-bot" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error
